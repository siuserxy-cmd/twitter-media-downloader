<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Media Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header h1 span { color: #1d9bf0; }

        .header p {
            color: #71767b;
            font-size: 15px;
        }

        .input-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            background: #0f1419;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            color: #e7e9ea;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-input:focus {
            border-color: #1d9bf0;
        }

        .url-input::placeholder {
            color: #71767b;
        }

        .options {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            align-items: center;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #2f3336;
            background: transparent;
            color: #e7e9ea;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #1d9bf0;
            border-color: #1d9bf0;
            color: white;
        }

        .mode-btn:hover:not(.active) {
            background: #1e2732;
        }

        .count-input {
            width: 80px;
            background: #0f1419;
            border: 1px solid #2f3336;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: #e7e9ea;
            outline: none;
            display: none;
        }

        .count-input.show { display: block; }

        .download-btn {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            border-radius: 25px;
            border: none;
            background: #1d9bf0;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .download-btn:hover { background: #1a8cd8; }
        .download-btn:disabled {
            background: #1d9bf044;
            cursor: not-allowed;
        }

        .result-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: none;
        }

        .result-card.show { display: block; }

        .log-area {
            max-height: 200px;
            overflow-y: auto;
            font-family: "SF Mono", Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #71767b;
        }

        .log-area .log-line {
            padding: 2px 0;
        }

        .log-area .success { color: #00ba7c; }
        .log-area .error { color: #f4212e; }
        .log-area .info { color: #1d9bf0; }

        .files-section {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #0f1419;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-type {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .file-type.image { background: #1d9bf022; color: #1d9bf0; }
        .file-type.video { background: #7856ff22; color: #7856ff; }
        .file-type.gif { background: #00ba7c22; color: #00ba7c; }

        .file-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            color: #71767b;
            font-size: 13px;
            white-space: nowrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .status-badge.running {
            background: #1d9bf022;
            color: #1d9bf0;
        }

        .status-badge.done {
            background: #00ba7c22;
            color: #00ba7c;
        }

        .status-badge.error {
            background: #f4212e22;
            color: #f4212e;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .credits {
            text-align: center;
            margin-top: 40px;
            color: #71767b;
            font-size: 13px;
        }

        .credits a {
            color: #1d9bf0;
            text-decoration: none;
        }

        .credits a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .container { padding: 20px 12px; }
            .header h1 { font-size: 22px; }
            .options { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>Twitter</span> Media Downloader</h1>
            <p>Powered by yt-dlp + gallery-dl + twscrape</p>
        </div>

        <div class="input-card">
            <input
                type="text"
                class="url-input"
                id="urlInput"
                placeholder="Paste Twitter/X URL here..."
                autofocus
            >
            <div class="options">
                <button class="mode-btn active" data-mode="tweet" onclick="setMode('tweet')">Single Tweet</button>
                <button class="mode-btn" data-mode="user" onclick="setMode('user')">User Timeline</button>
                <input
                    type="number"
                    class="count-input"
                    id="countInput"
                    value="20"
                    min="1"
                    max="200"
                    placeholder="Count"
                >
            </div>
            <button class="download-btn" id="downloadBtn" onclick="startDownload()">
                Download
            </button>
        </div>

        <div class="result-card" id="resultCard">
            <div class="status-badge running" id="statusBadge">
                <div class="spinner"></div>
                <span>Downloading...</span>
            </div>
            <div class="log-area" id="logArea"></div>
            <div class="files-section" id="filesSection"></div>
        </div>

        <div class="credits">
            <p>Open source on <a href="https://github.com/siuserxy-cmd/twitter-media-downloader" target="_blank">GitHub</a></p>
            <p style="margin-top:4px">yt-dlp / gallery-dl / twscrape</p>
        </div>
    </div>

    <script>
        let currentMode = 'tweet';
        let polling = null;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            document.getElementById('countInput').classList.toggle('show', mode === 'user');
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function addLog(msg, type = '') {
            const area = document.getElementById('logArea');
            const line = document.createElement('div');
            line.className = 'log-line ' + type;
            line.textContent = msg;
            area.appendChild(line);
            area.scrollTop = area.scrollHeight;
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            const btn = document.getElementById('downloadBtn');
            const card = document.getElementById('resultCard');
            const badge = document.getElementById('statusBadge');

            btn.disabled = true;
            btn.textContent = 'Downloading...';
            card.classList.add('show');
            document.getElementById('logArea').innerHTML = '';
            document.getElementById('filesSection').innerHTML = '';
            badge.className = 'status-badge running';
            badge.innerHTML = '<div class="spinner"></div><span>Downloading...</span>';

            addLog('Starting download...', 'info');

            try {
                const body = { url, mode: currentMode };
                if (currentMode === 'user') {
                    body.count = parseInt(document.getElementById('countInput').value) || 20;
                }

                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await resp.json();
                if (data.error) {
                    addLog('Error: ' + data.error, 'error');
                    badge.className = 'status-badge error';
                    badge.innerHTML = '<span>Failed</span>';
                    btn.disabled = false;
                    btn.textContent = 'Download';
                    return;
                }

                // 轮询状态
                pollStatus(data.task_id);
            } catch (e) {
                addLog('Request failed: ' + e.message, 'error');
                badge.className = 'status-badge error';
                badge.innerHTML = '<span>Failed</span>';
                btn.disabled = false;
                btn.textContent = 'Download';
            }
        }

        function pollStatus(taskId) {
            let lastLogCount = 0;

            polling = setInterval(async () => {
                try {
                    const resp = await fetch('/api/status/' + taskId);
                    const task = await resp.json();

                    // 更新日志
                    const logs = task.logs || [];
                    for (let i = lastLogCount; i < logs.length; i++) {
                        const log = logs[i];
                        const type = log.event === 'error' ? 'error' :
                                     log.event === 'complete' ? 'success' : 'info';
                        addLog(log.message || JSON.stringify(log), type);
                    }
                    lastLogCount = logs.length;

                    if (task.status === 'done' || task.status === 'error') {
                        clearInterval(polling);
                        const badge = document.getElementById('statusBadge');
                        const btn = document.getElementById('downloadBtn');

                        if (task.status === 'done' && task.result && task.result.success) {
                            badge.className = 'status-badge done';
                            const files = task.result.files || [];
                            const successCount = files.filter(f => f.status === 'success').length;
                            badge.innerHTML = '<span>Done! ' + successCount + '/' + files.length + ' files</span>';
                            renderFiles(files);
                        } else {
                            badge.className = 'status-badge error';
                            const errMsg = task.result ? task.result.error : 'Download failed';
                            badge.innerHTML = '<span>' + errMsg + '</span>';
                        }

                        btn.disabled = false;
                        btn.textContent = 'Download';
                    }
                } catch (e) {
                    // ignore poll errors
                }
            }, 800);
        }

        function renderFiles(files) {
            const section = document.getElementById('filesSection');
            section.innerHTML = '';

            files.forEach(file => {
                if (file.status !== 'success') return;

                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-info">
                        <span class="file-type ${file.type}">${file.type}</span>
                        <span class="file-name">${file.filename}</span>
                    </div>
                    <span class="file-size">${file.size ? formatSize(file.size) : ''}</span>
                `;
                section.appendChild(item);
            });
        }

        // Enter 键触发下载
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
